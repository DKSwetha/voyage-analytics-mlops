name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r api/requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 api/ --max-line-length=120 --extend-ignore=E203,W503

      - name: Run tests
        working-directory: api
        run: |
          pytest test_app.py -v

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t flight-price-api:ci -f docker/Dockerfile .